name: SPY Auto Report

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 1 * * 2-6'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Detect session
        id: session
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          MIN=$(TZ=America/New_York date +%M)
          TIME="${HOUR}${MIN}"
          if [ "$TIME" -lt "1000" ]; then echo "session=pre" >> $GITHUB_OUTPUT
          elif [ "$TIME" -lt "1200" ]; then echo "session=mid" >> $GITHUB_OUTPUT
          elif [ "$TIME" -lt "1430" ]; then echo "session=mid" >> $GITHUB_OUTPUT
          elif [ "$TIME" -lt "1600" ]; then echo "session=mid" >> $GITHUB_OUTPUT
          elif [ "$TIME" -lt "2000" ]; then echo "session=post" >> $GITHUB_OUTPUT
          else echo "session=post" >> $GITHUB_OUTPUT; fi
      - name: Run report
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python spy_report.py --session ${{ steps.session.outputs.session }} --no-imessage --no-deploy --no-kakao
      - name: Deploy to GitHub Pages
        run: |
          mkdir -p docs/archive
          cp reports/latest.html docs/index.html
          cp reports/latest.html docs/${{ steps.session.outputs.session }}.html
          TIMESTAMP=$(TZ=America/New_York date +%Y%m%d_%H%M)
          cp reports/latest.html docs/archive/spy_${TIMESTAMP}.html
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "SPY report $TIMESTAMP" --allow-empty
          git push
